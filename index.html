<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting to Spotify…</title>
<style>
  body{margin:0;background:#07090d;color:#e9eef4;font-family:sans-serif;
    display:flex;align-items:center;justify-content:center;height:100vh;
    flex-direction:column;gap:16px}
  .dot{width:10px;height:10px;border-radius:50%;background:#1DB954;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  p{color:#52637a;font-size:16px;margin:0}
</style>
</head>
<body>
<div class="dot"></div>
<p>Connecting to Spotify…</p>
<script>
  // IMPORTANT: set this to wherever your dashboard is running
  // Local server:    http://localhost:8888
  // Direct file:     file:///Users/yourname/xeneon_dashboard.html
  const DASHBOARD_URL = 'http://localhost:8888';

  // Spotify sends ?code=... or ?error=... as query params for PKCE flow.
  // Forward everything back to the dashboard so it can exchange the code.
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');

  if(error){
    document.querySelector('p').textContent = 'Spotify declined: ' + error;
  } else if(code){
    // Redirect to dashboard preserving the code as a query param
    window.location.href = DASHBOARD_URL + '?code=' + encodeURIComponent(code);
  } else {
    document.querySelector('p').textContent = 'Nothing received from Spotify.';
  }
</script>
</body>
</html>
